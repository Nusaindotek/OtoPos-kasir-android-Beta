<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OTOPOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="init()">

    <header>
        <h1>🔧 OTOPOS</h1>
        <button onclick="bukaModal('modal-setting')">⚙️ Setting</button>
    </header>

    <main>
        <div class="card" style="padding: 8px;">
            <div class="menu-grid">
                <button id="btn-servis" class="btn btn-green" onclick="setMode('servis')">MODE SERVIS</button>
                <button id="btn-part" class="btn btn-gray" onclick="setMode('part')">DIRECT PART</button>
            </div>
        </div>

        <div id="area-servis" class="card">
            <h2>ANTRIAN SERVIS</h2>
            <button class="btn btn-orange btn-besar" onclick="bukaModal('modal-antrian')">+ Tambah Antrian</button>
            <div id="list-antrian" style="margin-top:10px">Belum ada antrian</div>
        </div>

        <div class="card">
            <h2 id="judul-input">TAMBAH KE BILLING SERVIS</h2>
            <input type="text" id="input-produk" list="list-produk" placeholder="Ketik nama part...">
            <div class="row">
                <input type="number" id="input-qty" value="1" min="1" style="width:80px">
                <button class="btn btn-orange" onclick="tambahKeKeranjang()" style="flex:1">+ Part</button>
            </div>
            <div id="area-jasa" style="margin-top:10px">
                <h4>Tambah Jasa</h4>
                <div class="row">
                    <input id="input-jasa" placeholder="Nama Jasa">
                    <input id="harga-jasa" type="number" placeholder="Harga">
                    <button class="btn btn-blue" onclick="tambahJasaKeKeranjang()">+</button>
                </div>
            </div>
        </div>
    </main>

    <div class="billing-fixed">
        <h2>🛒 BILLING <span id="mode-label">SERVIS</span></h2>
        <div id="list-keranjang">Keranjang kosong</div>
        <div class="total">
            <span>TOTAL</span>
            <span id="total-harga">Rp 0</span>
        </div>
        <div id="area-bayar">
            <div class="row">
                <input type="number" id="input-bayar" placeholder="Uang Bayar" onkeyup="hitungKembalian()">
                <input type="text" id="input-kembalian" placeholder="Kembalian" readonly>
            </div>
        </div>
        <button class="btn btn-green btn-besar" onclick="checkout()">SELESAI & CETAK</button>
    </div>

    <datalist id="list-produk"></datalist>

    <div id="modal-antrian" class="modal hidden">
        <div class="modal-content">
            <h3>Tambah Antrian</h3>
            <input id="input-nopol" placeholder="Nopol: B 1234 CD">
            <input id="input-motor" placeholder="Motor: Beat 2020">
            <div class="row">
                <button class="btn btn-gray" onclick="tutupModal('modal-antrian')" style="flex:1">Batal</button>
                <button class="btn btn-green" onclick="tambahAntrian()" style="flex:1">Simpan</button>
            </div>
        </div>
    </div>

    <div id="modal-detail-servis" class="modal hidden">
        <div class="modal-content">
            <h3>Detail Servis: <span id="detail-nopol"></span></h3>
            <p><b>Motor:</b> <span id="detail-motor"></span></p>
            <select id="select-mekanik"></select>
            <input id="input-keluhan" placeholder="Keluhan">
            <h4>Jasa</h4>
            <div class="row"><input id="jasa-nama" placeholder="Nama Jasa"><input id="jasa-harga" type="number" placeholder="Harga"><button class="btn btn-blue" onclick="tambahJasaToAntrian()">+</button></div>
            <div id="list-jasa-detail"></div>
            <h4>Part</h4>
            <div class="row"><select id="part-nama"></select><input id="part-qty" type="number" value="1" style="width:60px"><button class="btn btn-orange" onclick="tambahPartToAntrian()">+</button></div>
            <div id="list-part-detail"></div>
            <div class="row">
                <button class="btn btn-gray" onclick="tutupModal('modal-detail-servis')" style="flex:1">Tutup</button>
                <button class="btn btn-green" onclick="pindahKeBilling()" style="flex:2">Pindah ke Billing</button>
                <button class="btn btn-blue" onclick="simpanDetailServis()" style="flex:1">Simpan</button>
            </div>
        </div>
    </div>

    <div id="modal-setting" class="modal hidden">
        <div class="modal-content">
            <h3>⚙️ PENGATURAN</h3>
            <div class="tab-header" style="grid-template-columns: 1fr 1fr 1fr 1fr 1fr;">
                <button onclick="showTab('tab-toko', this)" class="tab-btn tab-active">Toko</button>
                <button onclick="showTab('tab-part', this)" class="tab-btn">Part</button>
                <button onclick="showTab('tab-mekanik', this)" class="tab-btn">Mekanik</button>
                <button onclick="showTab('tab-laporan', this)" class="tab-btn">Laporan</button>
                <button onclick="showTab('tab-data', this)" class="tab-btn">Backup</button>
            </div>
            <div id="tab-toko" class="tab-content active">
                <input id="setting-nama" placeholder="Nama Toko">
                <input id="setting-alamat" placeholder="Alamat Toko">
                <button class="btn btn-blue" onclick="simpanSetting()">Simpan</button>
            </div>
            <div id="tab-part" class="tab-content">
                <input id="nama-produk" placeholder="Nama Part">
                <input id="harga-produk" type="number" placeholder="Harga Jual">
                <input id="stok-produk" type="number" placeholder="Stok Awal" value="0">
                <button class="btn btn-orange" onclick="simpanProduk()">Simpan Part</button><hr>
                <div id="list-part"></div>
            </div>
            <!-- TAB MEKANIK UDAH ADA POTONGAN % -->
            <div id="tab-mekanik" class="tab-content">
                <input id="nama-mekanik" placeholder="Nama Mekanik">
                <input id="potongan-mekanik" type="number" placeholder="Potongan Bengkel %" value="40">
                <button class="btn btn-blue" onclick="simpanMekanik()">Simpan Mekanik</button><hr>
                <div id="list-mekanik"></div>
            </div>
            <div id="tab-laporan" class="tab-content">
                <div class="row">
                    <input type="date" id="filter-tanggal">
                    <button class="btn btn-blue" onclick="loadRiwayat()">Filter</button>
                </div>
                <div id="ringkasan-harian" style="margin:10px 0; font-weight:bold"></div>
                <div id="list-riwayat" style="max-height: 300px; overflow-y: auto;"></div>
                <hr>
                <h4>Laporan Gaji Mekanik</h4>
                <div id="laporan-gaji-mekanik"></div>
            </div>
            <div id="tab-data" class="tab-content">
                <button class="btn btn-green" onclick="exportData()">⬇️ EXPORT DATA</button>
                <label class="btn btn-blue">⬆️ IMPORT DATA<input type="file" id="input-file" accept=".json" style="display:none" onchange="handleImport(event)"></label>
            </div>
            <button class="btn btn-gray" onclick="tutupModal('modal-setting')">Tutup</button>
        </div>
    </div>

    <div id="area-struk"></div>

<script src="app.js"></script>
</body>
</html>
