<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OTOPOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; background: #f1f5f9; }
       .btn-press:active { transform: scale(0.97); }
    </style>
</head>
<body class="pb-32">

    <!-- HEADER BIRU -->
    <header class="bg-blue-600 text-white p-4 rounded-b-2xl shadow-md">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🔧</span>
                <div>
                    <h1 class="text-2xl font-black">OTOPOS</h1>
                    <p class="text-sm text-blue-200" id="nama-toko-header">Bengkel HELICOPTER</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="bukaModal('modal-produk')" class="bg-orange-500 hover:bg-orange-600 btn-press px-4 py-2 rounded-xl font-bold flex items-center gap-1">
                    <span class="bg-white text-orange-500 text-xs px-2 py-0.5 rounded">F5</span> Input Part
                </button>
                <button onclick="bukaModal('modal-setting')" class="bg-blue-800 hover:bg-blue-900 btn-press px-4 py-2 rounded-xl font-bold flex items-center gap-1">
                    <span class="bg-white text-blue-800 text-xs px-2 py-0.5 rounded">F4</span> Setting
                </button>
            </div>
        </div>
    </header>

    <main class="p-4 space-y-4">
        <!-- TOMBOL MODE -->
        <div class="bg-gray-200 p-1 rounded-xl flex">
            <button id="btn-servis" onclick="setMode('servis', this)" class="flex-1 btn-press py-3 rounded-lg font-black bg-red-600 text-white shadow">
                <span class="bg-white/20 text-xs px-2 py-0.5 rounded mr-1">F2</span> MODE SERVIS
            </button>
            <button id="btn-part" onclick="setMode('part', this)" class="flex-1 btn-press py-3 rounded-lg font-black text-gray-500">
                <span class="bg-gray-300 text-xs px-2 py-0.5 rounded mr-1">F3</span> DIRECT PART
            </button>
        </div>

        <!-- AREA SERVIS -->
        <div id="area-servis" class="bg-white p-4 rounded-xl shadow">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-black text-red-600">DAFTAR ANTRIAN SERVIS</h3>
                <button onclick="bukaModal('modal-antrian')" class="bg-red-600 hover:bg-red-700 btn-press text-white px-4 py-2 rounded-lg font-bold">+ Tambah Antrian</button>
            </div>
            <div id="list-antrian" class="min-h-[150px] flex items-center justify-center text-gray-400">
                Belum ada antrian. Klik + Tambah Antrian
            </div>

            <hr class="my-4">
            <div class="flex gap-2">
                <div class="flex-1">
                    <label class="text-xs font-bold text-gray-500">CARI PRODUK (MENAMPILKAN SISA STOK)</label>
                    <input type="text" id="input-produk" list="list-produk" placeholder="Ketik nama part..." class="w-full border rounded-lg p-3">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500">QTY</label>
                    <input type="number" id="input-qty" value="1" min="1" class="w-20 border rounded-lg p-3 text-center">
                </div>
            </div>
        </div>

        <!-- AREA PART -->
        <div id="area-part" class="hidden bg-white p-4 rounded-xl shadow">
             <h3 class="font-black text-emerald-600 mb-2">JUAL LANGSUNG</h3>
             <input type="text" id="input-pembeli" placeholder="Nama Pembeli" class="w-full border bg-emerald-50 rounded-lg p-3">
        </div>
    </main>

    <!-- BILLING HITAM FIX BAWAH -->
    <div class="fixed bottom-0 left-0 right-0 bg-slate-900 text-white p-4 rounded-t-2xl shadow-2xl">
        <div class="flex justify-between items-center border-b border-slate-700 pb-2 mb-2">
            <h2 class="font-black text-emerald-400 flex items-center gap-2">🛒 BILLING</h2>
            <span id="billing-mode" class="text-xs bg-red-900/50 text-red-300 px-3 py-1 rounded-full font-bold">SERVIS</span>
        </div>
        <div id="list-keranjang" class="max-h-24 overflow-y-auto mb-2 text-sm">Keranjang kosong</div>
        <div class="flex justify-between items-center mb-3">
            <span class="font-bold text-slate-400">TOTAL:</span>
            <span id="total-harga" class="text-3xl font-black text-emerald-400">Rp 0</span>
        </div>
        <p class="text-xs font-bold text-slate-400 mb-2">BAYAR</p>
        <div class="grid grid-cols-3 gap-2 mb-3">
            <button onclick="setBayar('Tunai', this)" class="btn-bayar btn-press bg-slate-800 border-2 border-emerald-500 text-emerald-400 font-bold py-3 rounded-lg">💵 Tunai</button>
            <button onclick="setBayar('QRIS', this)" class="btn-bayar btn-press bg-slate-800 border border-slate-700 text-slate-400 font-bold py-3 rounded-lg">📱 QRIS</button>
            <button onclick="setBayar('Debit', this)" class="btn-bayar btn-press bg-slate-800 border-slate-700 text-slate-400 font-bold py-3 rounded-lg">💳 Debit</button>
        </div>
        <button onclick="checkout()" class="btn-press w-full bg-emerald-500 hover:bg-emerald-600 text-black font-black py-4 rounded-xl text-lg">SELESAI & CETAK</button>
    </div>

    <datalist id="list-produk"></datalist>

    <!-- MODAL ANTRIAN -->
    <div id="modal-antrian" class="hidden fixed inset-0 bg-black/50 z-30 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-4 w-full max-w-sm">
            <h3 class="font-black text-lg mb-3">Tambah Antrian</h3>
            <input id="input-nopol" placeholder="Nopol: B 1234 CD" class="w-full border p-3 rounded-lg mb-2 uppercase">
            <input id="input-motor" placeholder="Motor: Beat 2020" class="w-full border p-3 rounded-lg mb-3">
            <div class="flex gap-2">
                <button onclick="tutupModal('modal-antrian')" class="flex-1 bg-gray-200 py-3 rounded-lg font-bold">Batal</button>
                <button onclick="tambahAntrian()" class="flex-1 bg-red-600 text-white py-3 rounded-lg font-bold">Simpan</button>
            </div>
        </div>
    </div>

    <!-- MODAL PRODUK -->
    <div id="modal-produk" class="hidden fixed inset-0 bg-black/50 z-30 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-4 w-full max-w-sm">
            <h3 class="font-black text-lg mb-3">Input Part</h3>
            <input id="nama-produk" placeholder="Nama Part" class="w-full border p-3 rounded-lg mb-2">
            <input id="harga-produk" type="number" placeholder="Harga Jual" class="w-full border p-3 rounded-lg mb-2">
            <input id="stok-produk" type="number" placeholder="Stok Awal" value="0" class="w-full border p-3 rounded-lg mb-3">
            <div class="flex gap-2">
                <button onclick="tutupModal('modal-produk')" class="flex-1 bg-gray-200 py-3 rounded-lg font-bold">Batal</button>
                <button onclick="simpanProduk()" class="flex-1 bg-orange-500 text-white py-3 rounded-lg font-bold">Simpan</button>
            </div>
        </div>
    </div>

    <!-- MODAL SETTING -->
    <div id="modal-setting" class="hidden fixed inset-0 bg-black/50 z-30 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-4 w-full max-w-sm">
            <h3 class="font-black text-lg mb-3">Setting</h3>
            <input id="setting-nama" placeholder="Nama Toko" class="w-full border p-3 rounded-lg mb-2">
            <input id="setting-alamat" placeholder="Alamat" class="w-full border p-3 rounded-lg mb-3">
            <button onclick="simpanSetting()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold mb-2">Simpan</button>
            <button onclick="tutupModal('modal-setting')" class="w-full bg-gray-200 py-3 rounded-lg font-bold">Tutup</button>
        </div>
    </div>

<script src="app.js"></script>
</body>
</html>
