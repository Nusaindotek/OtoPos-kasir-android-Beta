<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OTOPOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; background: #f1f5f9; }
     .btn-press:active { transform: scale(0.97); }
     .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; }
     .tab-content { display: none; }
     .tab-content.active { display: block; }
    </style>
</head>
<body class="pb-32">

    <!-- HEADER BIRU -->
    <header class="bg-blue-600 text-white p-3 rounded-b-2xl shadow-md">
        <div class="flex flex-wrap justify-between items-center gap-2">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🔧</span>
                <div>
                    <h1 class="text-xl font-black">OTOPOS</h1>
                    <p class="text-xs text-blue-200" id="nama-toko-header">BENGKEL HELICOPTER</p>
                </div>
                <span class="bg-blue-800 px-2 py-1 rounded-lg text-xs flex items-center gap-1">👤 Admin</span>
            </div>
            <div class="flex gap-1.5">
                <button onclick="bukaModal('modal-produk')" class="bg-orange-500 hover:bg-orange-600 btn-press px-2 py-1.5 rounded-lg font-bold flex items-center gap-1 text-">
                    <span class="bg-white text-orange-500 text- px-1 py-0.5 rounded font-black">F5</span> Part
                </button>
                <button onclick="bukaModal('modal-setting')" class="bg-blue-800 hover:bg-blue-900 btn-press px-2 py-1.5 rounded-lg font-bold flex items-center gap-1 text-">
                    <span class="bg-white text-blue-800 text- px-1 py-0.5 rounded font-black">F4</span> Set
                </button>
            </div>
        </div>
    </header>

    <main class="p-3 space-y-3">
        <!-- TOMBOL MODE -->
        <div class="bg-gray-200 p-1 rounded-xl flex">
            <button id="btn-servis" onclick="setMode('servis', this)" class="flex-1 btn-press py-2.5 rounded-lg font-black bg-red-600 text-white shadow text-sm">
                <span class="bg-white/20 text- px-1.5 py-0.5 rounded mr-1 font-black">F2</span> MODE SERVIS
            </button>
            <button id="btn-part" onclick="setMode('part', this)" class="flex-1 btn-press py-2.5 rounded-lg font-black text-gray-500 text-sm">
                <span class="bg-gray-300 text- px-1.5 py-0.5 rounded mr-1 font-black">F3</span> DIRECT PART
            </button>
        </div>

        <!-- AREA SERVIS -->
        <div id="area-servis" class="bg-white p-3 rounded-xl shadow">
            <div class="flex flex-wrap justify-between items-center mb-3 gap-2">
                <h3 class="font-black text-red-600 text-sm">DAFTAR ANTRIAN SERVIS</h3>
                <button onclick="bukaModal('modal-antrian')" class="bg-red-600 hover:bg-red-700 btn-press text-white px-3 py-2 rounded-lg font-bold text-sm">+ Tambah Antrian</button>
            </div>
            <div id="list-antrian" class="min-h-[120px] text-sm">
                <p class="text-center text-gray-400 py-10">Belum ada antrian. Klik + Tambah Antrian</p>
            </div>

            <hr class="my-3">
            <div class="flex gap-2">
                <div class="flex-1">
                    <label class="text- font-bold text-gray-500">CARI PRODUK (MENAMPILKAN SISA STOK)</label>
                    <input type="text" id="input-produk" list="list-produk" placeholder="Ketik nama part..." class="w-full border rounded-lg p-2.5 text-sm">
                </div>
                <div>
                    <label class="text- font-bold text-gray-500">QTY</label>
                    <input type="number" id="input-qty" value="1" min="1" class="w-16 border rounded-lg p-2.5 text-center text-sm">
                </div>
            </div>
        </div>

        <!-- AREA PART -->
        <div id="area-part" class="hidden bg-white p-3 rounded-xl shadow">
             <h3 class="font-black text-emerald-600 mb-2 text-sm">JUAL LANGSUNG</h3>
             <input type="text" id="input-pembeli" placeholder="Nama Pembeli" class="w-full border bg-emerald-50 rounded-lg p-2.5 text-sm">
        </div>
    </main>

    <!-- BILLING HITAM FIX BAWAH -->
    <div class="fixed bottom-0 left-0 right-0 bg-slate-900 text-white p-3 rounded-t-2xl shadow-2xl">
        <div class="flex justify-between items-center border-b border-slate-700 pb-2 mb-2">
            <h2 class="font-black text-emerald-400 flex items-center gap-2 text-sm">🛒 BILLING</h2>
            <span id="billing-mode" class="text- bg-red-900/50 text-red-300 px-3 py-1 rounded-full font-bold">SERVIS</span>
        </div>
        <div id="list-keranjang" class="max-h-20 overflow-y-auto mb-2 text-sm">Keranjang kosong</div>
        <div class="flex justify-between items-center mb-2">
            <span class="font-bold text-slate-400 text-sm">TOTAL:</span>
            <span id="total-harga" class="text-2xl font-black text-emerald-400">Rp 0</span>
        </div>
        <p class="text- font-bold text-slate-400 mb-1.5">BAYAR</p>
        <div class="grid grid-cols-3 gap-2 mb-3">
            <button onclick="setBayar('Tunai', this)" class="btn-bayar btn-press bg-slate-800 border-2 border-emerald-500 text-emerald-400 font-bold py-2.5 rounded-lg text-sm flex items-center justify-center gap-1">💵 Tunai</button>
            <button onclick="setBayar('QRIS', this)" class="btn-bayar btn-press bg-slate-800 border-slate-700 text-slate-400 font-bold py-2.5 rounded-lg text-sm flex items-center justify-center gap-1">📱 QRIS</button>
            <button onclick="setBayar('Debit', this)" class="btn-bayar btn-press bg-slate-800 border-slate-700 text-slate-400 font-bold py-2.5 rounded-lg text-sm flex items-center justify-center gap-1">💳 Debit</button>
        </div>
        <button onclick="checkout()" class="btn-press w-full bg-emerald-500 hover:bg-emerald-600 text-black font-black py-3.5 rounded-xl text-base">SELESAI & CETAK</button>
    </div>

    <datalist id="list-produk"></datalist>

    <!-- MODAL SETTING BARU LENGKAP 4 TAB -->
    <div id="modal-setting" class="hidden fixed inset-0 bg-black/50 z-30 flex items-end justify-center">
        <div class="bg-white rounded-t-2xl p-4 w-full max-h-[80vh] overflow-y-auto">
            <h3 class="font-black text-lg mb-3 flex items-center gap-2">⚙️ PENGATURAN</h3>
            
            <!-- TAB MENU -->
            <div class="flex border-b mb-3 text-sm font-bold">
                <button onclick="showTab('tab-mekanik', this)" class="tab-btn tab-active flex-1 py-2">Data Mekanik</button>
                <button onclick="showTab('tab-toko', this)" class="tab-btn flex-1 py-2 text-gray-500">Data Toko</button>
                <button onclick="showTab('tab-data', this)" class="tab-btn flex-1 py-2 text-gray-500">Manajemen Data</button>
                <button onclick="showTab('tab-laporan', this)" class="tab-btn flex-1 py-2 text-gray-500">Laporan</button>
            </div>

            <!-- TAB 1: DATA MEKANIK -->
            <div id="tab-mekanik" class="tab-content active space-y-3">
                <button onclick="bukaModalTambahMekanik()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-bold">+ Tambah Mekanik</button>
                <div id="list-mekanik"></div>
            </div>

            <!-- TAB 2: DATA TOKO -->
            <div id="tab-toko" class="tab-content space-y-2">
                <input id="setting-nama" placeholder="Nama Toko" class="w-full border p-3 rounded-lg">
                <input id="setting-alamat" placeholder="Alamat" class="w-full border p-3 rounded-lg">
                <input id="setting-telp" placeholder="No Telp" class="w-full border p-3 rounded-lg">
                <button onclick="simpanSetting()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Simpan Data Toko</button>
            </div>

            <!-- TAB 3: MANAJEMEN DATA -->
            <div id="tab-data" class="tab-content space-y-3">
                <h4 class="font-bold text-xs text-gray-600">BACKUP & RESTORE</h4>
                <button onclick="exportData()" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold">⬇️ EXPORT BACKUP.JSON</button>
                <label class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold flex justify-center items-center cursor-pointer">⬆️ IMPORT BACKUP.JSON
                    <input type="file" id="input-file" accept=".json" class="hidden" onchange="handleImport(event)">
                </label>
            </div>

            <!-- TAB 4: LAPORAN -->
            <div id="tab-laporan" class="tab-content text-center text-gray-400 py-10">
                Fitur Laporan Segera Hadir
            </div>

            <button onclick="tutupModal('modal-setting')" class="w-full bg-gray-200 mt-4 py-3 rounded-lg font-bold">Tutup</button>
        </div>
    </div>

    <!-- MODAL TAMBAH MEKANIK -->
    <div id="modal-mekanik" class="hidden fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-4 w-full max-w-sm">
            <h3 class="font-black text-lg mb-3">Tambah Mekanik</h3>
            <input id="nama-mekanik" placeholder="Nama Mekanik" class="w-full border p-3 rounded-lg mb-3">
            <div class="flex gap-2">
                <button onclick="tutupModal('modal-mekanik')" class="flex-1 bg-gray-200 py-3 rounded-lg font-bold">Batal</button>
                <button onclick="simpanMekanik()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold">Simpan</button>
            </div>
        </div>
    </div>

    <!-- MODAL LAINNYA TETAP -->
    <div id="modal-antrian" class="hidden fixed inset-0 bg-black/50 z-30 flex items-center justify-center p-4">...</div>
    <div id="modal-produk" class="hidden fixed inset-0 bg-black/50 z-30 flex items-center justify-center p-4">...</div>

<script src="app.js"></script>
</body>
</html>
