<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOPOS</title>
    <!-- PASTIKAN SCRIPT INI ADA -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-2">

    <!-- MODAL SETTINGS (Versi Sederhana & Aman) -->
    <div id="settings-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-2 z-50">
        <div class="bg-white rounded-xl w-full max-w-md p-4 shadow-2xl">
            <h3 class="font-bold mb-4 text-lg border-b pb-2">⚙️ PENGATURAN</h3>
            
            <!-- Tab -->
            <div class="flex gap-1 mb-4 text-xs font-bold border-b pb-2">
                <button onclick="openTab('tab-mekanik', event)" class="px-2 py-1 bg-gray-100 rounded">Mekanik</button>
                <button onclick="openTab('tab-toko', event)" class="px-2 py-1 bg-gray-100 rounded">Toko</button>
            </div>

            <!-- Konten -->
            <div id="tab-mekanik" class="tab-content text-sm">
                <div id="list-mekanik">List Mekanik...</div>
            </div>

            <div id="tab-toko" class="tab-content hidden space-y-3">
                <input type="text" id="setting-nama" placeholder="Nama Bengkel" class="w-full border p-2 rounded">
                <input type="text" id="setting-alamat" placeholder="Alamat" class="w-full border p-2 rounded">
                <button onclick="simpanSettingToko()" class="w-full bg-blue-600 text-white p-2 rounded font-bold">Simpan</button>
            </div>

            <button onclick="toggleModal('settings-modal')" class="w-full bg-gray-300 p-2 mt-4 rounded font-bold">Tutup</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function openTab(id, event) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
