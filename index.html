<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>OTOPOS - HP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
      .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-2 font-sans flex-col gap-2">

    <!-- TOP BAR HP -->
    <header class="bg-blue-600 text-white p-3 rounded-xl shadow-md flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-xl">🛠️</span>
            <div>
                <h1 class="text-base font-black">OTOPOS</h1>
                <p class="text-[10px] text-blue-200" id="nama-toko-header">Bengkel HELICOPTER</p>
            </div>
        </div>
        <div class="flex items-center gap-1">
            <span class="bg-blue-700 px-2 py-1 rounded-lg text-xs">👤 Admin</span>
            <button onclick="toggleModal('settings-modal')" class="bg-blue-800 p-2 rounded-lg">⚙️</button>
        </div>
    </header>

    <!-- TAB MODE -->
    <div class="grid grid-cols-2 gap-2">
        <button id="tab-servis" onclick="setMode('servis')" class="btn-press py-3 rounded-xl font-black text-sm bg-red-600 text-white shadow-md">🔴 SERVIS</button>
        <button id="tab-part" onclick="setMode('part')" class="btn-press py-3 rounded-xl font-black text-sm bg-gray-200 text-gray-600">🟢 JUAL PART</button>
    </div>

    <!-- AREA UTAMA -->
    <main class="bg-white rounded-xl shadow-md border p-3 flex-1 flex-col gap-3 min-h-0">

        <!-- AREA SERVIS -->
        <div id="area-servis">
            <div class="flex justify-between items-center mb-2">
                <h3 class="font-black text-sm text-red-600">ANTRIAN SERVIS</h3>
                <button onclick="toggleModal('antrian-modal')" class="bg-red-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold">+ Antrian</button>
            </div>
            <div id="list-antrian" class="space-y-2 h-32 overflow-y-auto mb-3"></div>
            <div id="form-servis-detail" class="hidden"></div>
        </div>

        <!-- AREA PART -->
        <div id="area-part" class="hidden">
             <h3 class="font-black text-sm text-emerald-600 mb-2">JUAL LANGSUNG</h3>
             <input type="text" id="input-pembeli" placeholder="Nama Pembeli" class="w-full border rounded-lg p-2 text-sm">
        </div>

        <!-- INPUT PRODUK -->
        <div id="input-manual-part" class="mt-auto pt-3 border-t">
            <label class="block text-xs font-black text-gray-500 mb-1">CARI PRODUK</label>
            <input type="text" id="input-produk-search" list="list-produk" placeholder="Ketik nama part..." class="w-full border rounded-lg p-2.5 text-sm mb-2">
            <div class="grid grid-cols-3 gap-2">
                <div class="col-span-2">
                    <label class="block text-xs font-black text-gray-500 mb-1">QTY</label>
                    <input type="number" id="input-qty" value="1" min="1" class="w-full border rounded-lg p-2.5 text-sm text-center">
                </div>
                <div class="flex items-end">
                    <button id="btn-tambah" onclick="tambahKeBilling()" class="btn-press w-full bg-emerald-600 text-white font-black py-2.5 rounded-xl text-sm">➕</button>
                </div>
            </div>
        </div>
    </main>

    <!-- KASIR PANEL HP -->
    <aside class="bg-slate-900 text-white rounded-xl shadow-md p-3 flex-col gap-3">
        <div class="flex justify-between items-center border-b border-slate-700 pb-2">
            <h2 class="font-black text-sm text-emerald-400">🛒 BILLING</h2>
            <span id="billing-type" class="text-[10px] bg-red-900/50 text-red-300 px-2 py-1 rounded-full">SERVIS</span>
        </div>
        <div id="cart-items" class="space-y-2 max-h-40 overflow-y-auto"></div>
        <div class="flex justify-between items-center"><span class="text-xs text-slate-400">TOTAL:</span><span id="cart-total" class="text-xl font-black text-emerald-400">Rp 0</span></div>

        <div class="grid grid-cols-3 gap-2">
            <button onclick="setPayment('Tunai')" class="btn-pay bg-slate-800 border border-emerald-500/50 text-emerald-400 text-xs font-bold py-2 rounded-lg">💵</button>
            <button onclick="setPayment('QRIS')" class="btn-pay bg-slate-800 border border-slate-700 text-slate-400 text-xs font-bold py-2 rounded-lg">📱</button>
            <button onclick="setPayment('Debit')" class="btn-pay bg-slate-800 border-slate-700 text-slate-400 text-xs font-bold py-2 rounded-lg">💳</button>
        </div>
        <button onclick="prosesCheckout()" class="btn-press w-full bg-emerald-500 text-slate-950 font-black py-3 rounded-xl text-sm">SELESAI</button>
    </aside>

    <!-- MODAL KAMU TETAP PAKE YANG LAMA, TINGGAL COPY -->

    <script src="app.js"></script>
</body>
</html>
