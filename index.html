<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OtoPOS - Bengkel App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
</head>
<body onload="init()">

    <div class="header">
        <h1 id="nama-bengkel">OTOPOS</h1>
        <div class="header-btn">
            <button class="btn btn-blue" onclick="bukaModal('modal-antrian')">+ Tambah Antrian</button>
            <button class="btn btn-gray" onclick="bukaModal('modal-setting')">Setting</button>
        </div>
    </div>

    <div class="main-container">
        <div class="kolom">
            <h3>ANTRIAN SERVIS</h3>
            <div id="list-antrian" class="list-box">Belum ada antrian</div>
        </div>

        <div class="kolom">
            <h3 id="judul-input">TAMBAH KE BILLING</h3>
            <div class="mode-switch">
                <button id="btn-servis" class="btn btn-green" onclick="setMode('servis')">Mode Servis</button>
                <button id="btn-part" class="btn btn-gray" onclick="setMode('part')">Mode Direct Part</button>
            </div>
            <div id="area-servis">
                <input type="text" id="input-produk" list="list-produk" placeholder="Scan/Ketik Nama Part">
                <datalist id="list-produk"></datalist>
                <input type="number" id="input-qty" value="1" min="1">
                <button class="btn btn-green" onclick="tambahKeKeranjang()">+ Part</button>
            </div>
            <div id="area-jasa">
                <input type="text" id="input-jasa" placeholder="Nama Jasa">
                <input type="number" id="harga-jasa" placeholder="Harga Jasa">
                <button class="btn btn-green" onclick="tambahJasaKeKeranjang()">+ Jasa</button>
            </div>
        </div>

        <div class="kolom">
            <h3>KERANJANG <span id="mode-label">SERVIS</span></h3>
            <div id="list-keranjang" class="list-box">Keranjang kosong</div>
            <div class="total-area">
                <h4>TOTAL: <span id="total-harga">Rp 0</span></h4>
            </div>
            <div id="area-bayar">
                <div class="row">
                    <input type="number" id="input-bayar" placeholder="Uang Bayar" onkeyup="hitungKembalian()">
                    <input type="text" id="input-kembalian" placeholder="Kembalian" readonly>
                </div>
            </div>
            <button class="btn btn-orange btn-full" onclick="checkout()">BAYAR & CETAK</button>
        </div>
    </div>

    <div id="modal-antrian" class="modal hidden">
        <div class="modal-content">
            <h3>Tambah Antrian Baru</h3>
            <input id="input-nopol" placeholder="Nopol: B 1234 CD">
            <input id="input-motor" placeholder="Motor: Beat 2020">
            <div class="modal-footer">
                <button class="btn btn-gray" onclick="tutupModal('modal-antrian')">Batal</button>
                <button class="btn btn-blue" onclick="tambahAntrian()">Simpan Antrian</button>
            </div>
        </div>
    </div>

    <div id="modal-detail-servis" class="modal hidden">
        <div class="modal-content besar">
            <h3>Detail Servis: <span id="detail-nopol"></span></h3>
            <p>Motor: <span id="detail-motor"></span></p>
            <div class="form-row">
                <label>Pilih Mekanik:</label>
                <select id="select-mekanik"></select>
            </div>
            <textarea id="input-keluhan" placeholder="Keluhan Customer"></textarea>
            <hr>
            <h4>Tambah Jasa</h4>
            <div class="form-row">
                <input id="jasa-nama" placeholder="Nama Jasa">
                <input id="jasa-harga" type="number" placeholder="Harga">
                <button class="btn btn-green" onclick="tambahJasaToAntrian()">+</button>
            </div>
            <div id="list-jasa-detail" class="list-box kecil"></div>
            <hr>
            <h4>Tambah Part</h4>
            <div class="form-row">
                <select id="part-nama"></select>
                <input id="part-qty" type="number" value="1" min="1">
                <button class="btn btn-green" onclick="tambahPartToAntrian()">+</button>
            </div>
            <div id="list-part-detail" class="list-box kecil"></div>
            <div class="modal-footer">
                <button class="btn btn-gray" onclick="tutupModal('modal-detail-servis')">Tutup</button>
                <button class="btn btn-blue" onclick="simpanDetailServis()">Simpan Data</button>
                <button class="btn btn-orange" onclick="pindahKeBilling()">Pindah ke Billing</button>
            </div>
        </div>
    </div>

    <div id="modal-setting" class="modal hidden">
        <div class="modal-content besar">
            <h3>Pengaturan</h3>
            <div class="tabs">
                <button class="tab-btn tab-active" onclick="showTab('tab-toko', this)">Data Toko</button>
                <button class="tab-btn" onclick="showTab('tab-part', this)">Data Part</button>
                <button class="tab-btn" onclick="showTab('tab-mekanik', this)">Data Mekanik</button>
                <button class="tab-btn" onclick="showTab('tab-laporan', this)">Laporan</button>
                <button class="tab-btn" onclick="showTab('tab-backup', this)">Backup</button>
            </div>
            <div id="tab-toko" class="tab-content active">
                <input id="setting-nama" placeholder="Nama Bengkel">
                <textarea id="setting-alamat" placeholder="Alamat Bengkel"></textarea>
                <button class="btn btn-blue" onclick="simpanSetting()">Simpan Data Toko</button>
            </div>
            <div id="tab-part" class="tab-content">
                <div class="form-row">
                    <input id="nama-produk" placeholder="Nama Part">
                    <input id="harga-produk" type="number" placeholder="Harga Jual">
                    <input id="stok-produk" type="number" placeholder="Stok" value="0">
                    <button class="btn btn-green" onclick="simpanProduk()">Simpan</button>
                </div>
                <div id="list-part" class="list-box"></div>
            </div>
            <div id="tab-mekanik" class="tab-content">
                <div class="form-row">
                    <input id="nama-mekanik" placeholder="Nama Mekanik">
                    <input id="potongan-mekanik" type="number" placeholder="Potongan Bengkel %" value="40">
                    <button class="btn btn-green" onclick="simpanMekanik()">Simpan</button>
                </div>
                <div id="list-mekanik" class="list-box"></div>
            </div>
            <div id="tab-laporan" class="tab-content">
                <input type="date" id="filter-tanggal" onchange="loadRiwayat()">
                <h4>Ringkasan Harian</h4>
                <div id="ringkasan-harian"></div>
                <h4>Laporan Gaji Mekanik</h4>
                <div id="laporan-gaji-mekanik" class="list-box kecil"></div>
                <h4>Riwayat Transaksi</h4>
                <div id="list-riwayat" class="list-box"></div>
            </div>
            <div id="tab-backup" class="tab-content">
                <button class="btn btn-blue" onclick="exportData()">Export Data.json</button>
                <input type="file" id="import-file" onchange="handleImport(event)">
            </div>
            <div class="modal-footer">
                <button class="btn btn-gray" onclick="tutupModal('modal-setting')">Tutup</button>
            </div>
        </div>
    </div>

    <div id="area-struk" class="struk-print"></div>
    <script src="app.js"></script>
</body>
</html>
